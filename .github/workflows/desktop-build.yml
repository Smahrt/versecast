name: Windows build

# Builds a FULLY STANDALONE VerseCast Windows app on a native windows-latest
# runner. Bundles everything needed to run on a clean machine: the server,
# better-sqlite3 (compiled natively here), onnxruntime (semantic search),
# the MiniLM embedding model, the KJV db + index, themes, both UIs, the
# whisper.cpp speech engine (whisper-server.exe + DLLs), the base.en speech
# model, and app-local VC++ runtime DLLs.
#
# Mac is built locally (`npm run dist:mac`) and is intentionally not in CI:
# macOS runners bill at 10x minutes. This job runs on windows-latest only.
#
# Trigger from the Actions tab (workflow_dispatch) or by pushing a v* tag.
# The single installer artifact (~340 MB with base.en) stays under the
# 500 MB Free-plan artifact storage — delete old run artifacts (or use a
# public repo) if you run it many times in a week.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  WHISPER_VERSION: v1.8.6

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Drop the lockfile so npm resolves the WINDOWS native optional packages
      # (lightningcss/esbuild/rollup/sharp *-win32-x64-msvc). A lockfile made on
      # macOS pins mac-only optionals and npm then skips the Windows ones — the
      # long-standing npm optional-deps cross-platform bug.
      - name: Install workspace dependencies
        shell: bash
        run: rm -f package-lock.json && npm install

      - name: Build UI bundles
        run: npm run build

      - name: Build KJV database
        run: npm run data:db # reads the committed resources/data/en_kjv.json

      # Embedding model is committed (resources/models/hf-cache) and loaded
      # offline, so this builds the index with no network.
      - name: Build semantic index (offline, from the bundled model)
        run: npm run data:index

      - name: Stage whisper.cpp speech engine (whisper-server.exe + DLLs)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force resources/bin | Out-Null
          $url = "https://github.com/ggml-org/whisper.cpp/releases/download/$env:WHISPER_VERSION/whisper-bin-x64.zip"
          $ok = $false
          for ($i = 1; $i -le 5; $i++) {
            try { Invoke-WebRequest $url -OutFile whisper.zip; $ok = $true; break }
            catch { Write-Warning "whisper download attempt $i failed: $_"; Start-Sleep -Seconds (10 * $i) }
          }
          if (-not $ok) { throw "whisper.cpp download failed after 5 attempts" }
          Expand-Archive whisper.zip -DestinationPath whisper-tmp -Force
          $files = 'whisper-server.exe','ggml.dll','ggml-base.dll','ggml-cpu.dll','whisper.dll','SDL2.dll'
          foreach ($f in $files) { Copy-Item "whisper-tmp/Release/$f" resources/bin/ -Force }
          Get-ChildItem resources/bin

      # base.en is 141 MB (> GitHub's 100 MB file limit) so it can't be committed.
      # Download with retry/backoff to ride out HuggingFace rate limits (429).
      # Optional: add an HF_TOKEN repo secret (a free HuggingFace read token) and
      # this uses it — authenticated requests aren't rate-limited.
      - name: Download base.en speech model
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force resources/models | Out-Null
          $url = "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin"
          $out = "resources/models/ggml-base.en.bin"
          $headers = @{}
          if ($env:HF_TOKEN) { $headers["Authorization"] = "Bearer $env:HF_TOKEN" }
          $ok = $false
          for ($i = 1; $i -le 6; $i++) {
            try { Invoke-WebRequest $url -OutFile $out -Headers $headers; $ok = $true; break }
            catch { Write-Warning "base.en download attempt $i failed: $_"; Start-Sleep -Seconds (15 * $i) }
          }
          if (-not $ok) { throw "base.en download failed after 6 attempts (HuggingFace rate limit?)" }
          "{0:N0} MB" -f ((Get-Item $out).Length / 1MB)

      - name: Stage app-local VC++ runtime DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force resources/win-runtime | Out-Null
          foreach ($d in 'vcruntime140.dll','vcruntime140_1.dll','msvcp140.dll') {
            $src = Join-Path $env:SystemRoot "System32/$d"
            if (Test-Path $src) { Copy-Item $src resources/win-runtime/ -Force } else { Write-Warning "missing $d" }
          }
          Get-ChildItem resources/win-runtime

      - name: Install electron app dependencies
        working-directory: electron
        shell: bash
        run: rm -f package-lock.json && npm install

      # No GH_TOKEN here: its presence makes electron-builder assume a GitHub
      # publish/auto-update target and fail on repo detection. These are
      # test builds with no auto-update (see publish: never in dist:win).
      - name: Package standalone Windows app
        working-directory: electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # unsigned test build
        run: npm run dist:win

      # Upload only the installer to stay under the 500 MB private-repo cap.
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: versecast-windows-standalone
          path: electron/release/*-setup.exe
          if-no-files-found: error
          retention-days: 7
